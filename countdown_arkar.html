<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Countdown to ARKAR WAR 17:00 UTC</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    .countdown{display:inline-grid;grid-auto-flow:column;gap:12px;align-items:center}
    .unit{background:#111;color:#fff;padding:12px;border-radius:8px;min-width:64px;text-align:center}
    .label{font-size:12px;color:#555;margin-top:6px;text-align:center}
    .wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
    .small{font-size:14px;color:#666}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Countdown to ARKAR WAR — 17:00 UTC</h2>

    <!-- Container: dán vào trang nơi bạn muốn hiển thị bộ đếm -->
    <div id="countdown" aria-live="polite" role="timer">
      <div class="countdown">
        <div>
          <div class="unit" id="days">--</div>
          <div class="label">Day</div>
        </div>
        <div>
          <div class="unit" id="hours">--</div>
          <div class="label">Hours</div>
        </div>
        <div>
          <div class="unit" id="minutes">--</div>
          <div class="label">Minutes</div>
        </div>
        <div>
          <div class="unit" id="seconds">--</div>
          <div class="label">Seconds</div>
        </div>
      </div>
    </div>

    <div class="small">Time: <strong>Saturday 17:00 UTC</strong>. Display as your local time.</div>
  </div>

  <noscript>
    <p>JavaScript cần bật để xem bộ đếm thời gian.</p>
  </noscript>

  <script>
    // Tính ngày mục tiêu: lần Thứ Bảy tới lúc 17:00 UTC
    function nextSaturdayAt17UTC(now = new Date()){
      // Tạo một Date thể hiện hôm nay, 17:00 UTC
      const target = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 17, 0, 0));
      const targetDay = 6; // 0 = Chủ Nhật, ..., 6 = Thứ Bảy
      const todayUTCday = now.getUTCDay();

      // Số ngày cần cộng để đến thứ 6 (Saturday)
      let diffDays = (targetDay - todayUTCday + 7) % 7;
      target.setUTCDate(target.getUTCDate() + diffDays);

      // Nếu hôm nay là Thứ Bảy và đã qua 17:00 UTC thì nhảy sang tuần sau
      if (diffDays === 0 && now.getTime() >= target.getTime()){
        target.setUTCDate(target.getUTCDate() + 7);
      }

      return target;
    }

    function updateCountdown(){
      const now = new Date();
      const target = nextSaturdayAt17UTC(now);
      let diff = target.getTime() - now.getTime(); // milliseconds

      if (diff < 0) diff = 0;

      const sec = Math.floor((diff/1000) % 60);
      const min = Math.floor((diff/1000/60) % 60);
      const hr  = Math.floor((diff/1000/60/60) % 24);
      const days = Math.floor(diff/1000/60/60/24);

      document.getElementById('days').textContent = String(days);
      document.getElementById('hours').textContent = String(hr).padStart(2,'0');
      document.getElementById('minutes').textContent = String(min).padStart(2,'0');
      document.getElementById('seconds').textContent = String(sec).padStart(2,'0');

      // Cập nhật ARIA cho screen reader: ngày giờ còn lại dạng chuỗi
      const timerEl = document.getElementById('countdown');
      timerEl.setAttribute('aria-label', `${days} ngày, ${hr} giờ, ${min} phút, ${sec} giây đến Thứ Bảy 17:00 UTC`);

      // Nếu đến thời điểm, hiển thị thông báo
      if (diff === 0){
        clearInterval(intervalId);
        timerEl.innerHTML = '<strong>Đã đến — Thứ Bảy 17:00 UTC!</strong>';
      }
    }

    // Chạy ngay lập tức và đặt interval
    updateCountdown();
    const intervalId = setInterval(updateCountdown, 1000);

    // Nếu muốn: khi tab được ẩn (throttled), update lại khi focus để tránh nhảy giây
    window.addEventListener('visibilitychange', () => {
      if (!document.hidden){ updateCountdown(); }
    });
  </script>
</body>
</html>
