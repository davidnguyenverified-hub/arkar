<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Countdown Timers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #00ffea;
      text-align: center;
      padding-top: 50px;
    }
    h1 { color: #ffdd00; margin-bottom: 10px; }
    .timer {
      font-size: 2em;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <h1>Time to ARKAR WAR</h1>
  <div id="weekly" class="timer"></div>

  <h1>Time to Castle Siege</h1>
  <div id="castle" class="timer"></div>

  <script>
    // ====== Countdown 1: Every Saturday 17:00 UTC ======
    function getNextSaturday17UTC() {
      const now = new Date();
      const next = new Date(now);
      next.setUTCDate(now.getUTCDate() + ((6 - now.getUTCDay() + 7) % 7)); // Saturday = 6
      next.setUTCHours(17, 0, 0, 0);
      if (next <= now) next.setUTCDate(next.getUTCDate() + 7); // if past, add 7 days
      return next;
    }

    // ====== Countdown 2: Every 2 weeks, 5:00 AM UTC, starting from 8 Nov 2025 ======
    function getNextCastleSiege() {
      const start = new Date(Date.UTC(2025, 10, 8, 5, 0, 0)); // month 10 = November
      const now = new Date();
      let diffWeeks = Math.floor((now - start) / (14 * 24 * 60 * 60 * 1000));
      if (diffWeeks < 0) diffWeeks = -1; // before first event
      let next = new Date(start.getTime() + (diffWeeks + 1) * 14 * 24 * 60 * 60 * 1000);
      if (next <= now) next = new Date(next.getTime() + 14 * 24 * 60 * 60 * 1000);
      return next;
    }

    // ====== Display countdown ======
    function updateCountdown() {
      const now = new Date();

      // Weekly countdown
      const nextWeekly = getNextSaturday17UTC();
      const diff1 = nextWeekly - now;
      const days1 = Math.floor(diff1 / (1000 * 60 * 60 * 24));
      const hours1 = Math.floor((diff1 / (1000 * 60 * 60)) % 24);
      const mins1 = Math.floor((diff1 / (1000 * 60)) % 60);
      const secs1 = Math.floor((diff1 / 1000) % 60);

      document.getElementById("weekly").textContent =
        `${days1}d ${hours1}h ${mins1}m ${secs1}s to Saturday 17:00 UTC`;

      // Castle Siege countdown
      const nextCastle = getNextCastleSiege();
      const diff2 = nextCastle - now;
      const days2 = Math.floor(diff2 / (1000 * 60 * 60 * 24));
      const hours2 = Math.floor((diff2 / (1000 * 60 * 60)) % 24);
      const mins2 = Math.floor((diff2 / (1000 * 60)) % 60);
      const secs2 = Math.floor((diff2 / 1000) % 60);

      document.getElementById("castle").textContent =
        `${days2}d ${hours2}h ${mins2}m ${secs2}s to Saturday 05:00 UTC`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
