<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MU Shop</title>

<style>
body {
  background: #0b0b0e;
  color: #fff;
  font-family: Arial;
}

.section {
  margin: 30px 0;
}

.section h2 {
  border-left: 4px solid #00ffcc;
  padding-left: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.card {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  position: relative;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 10px rgba(0,255,200,0.3);
}

.img {
  height: 100px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.img img {
  max-height: 100%;
}

.placeholder {
  opacity: 0.5;
}

.sold {
  opacity: 0.4;
  filter: grayscale(80%);
}

.sold::after {
  content: "SOLD";
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: red;
  font-weight: bold;
}

.price {
  color: #00ffcc;
}

.badge {
  position: absolute;
  top: 5px;
  right: 5px;
  font-size: 11px;
}

.hot { color: orange; }
.new { color: #00ffcc; }

.details {
  font-size: 11px;
  opacity: 0.7;
}
</style>

</head>

<body>

<h1>🛒 MU Taxi Shop</h1>
<div id="app"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQgQuqvQJuRPCw_zJfgdGn0awqWwTweuJS1k2TPg83XOHsACvQnVxKZeMETZErpxuLXDBJyxXjMkVRJ/pub?gid=0&single=true&output=csv";

const iconMap = {
  wing: "https://img.icons8.com/ios-filled/50/ffffff/wings.png",
  jewel: "https://img.icons8.com/ios-filled/50/ffffff/gem.png",
  staff: "https://img.icons8.com/ios-filled/50/ffffff/magic.png",
  shield: "https://img.icons8.com/ios-filled/50/ffffff/shield.png"
};

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const data = parseCSV(csv).map(normalize);
    render(data);
  });

// FIX CSV (quan trọng nếu có dấu phẩy)
function parseCSV(text) {
  const rows = text.split("\n");
  const headers = rows[0].split(",");

  return rows.slice(1).map(row => {
    const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = values[i]?.replace(/"/g, "");
    });
    return obj;
  });
}

// chuẩn hóa
function normalize(item) {
  return {
    ...item,
    Status: item.Status?.toLowerCase(),
    Type: item.Type?.toLowerCase(),
    Tag: item.Tag?.toLowerCase()
  };
}

function render(items) {

  const grouped = {};

  items.forEach(item => {
    if (!grouped[item.Type]) grouped[item.Type] = [];
    grouped[item.Type].push(item);
  });

  const app = document.getElementById("app");

  for (let type in grouped) {

    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `<h2>${type.toUpperCase()}</h2>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    grouped[type].sort((a, b) => {
      if (a.Status === b.Status) return 0;
      return a.Status === "available" ? -1 : 1;
    });

    grouped[type].forEach(item => {
      grid.innerHTML += renderCard(item);
    });

    section.appendChild(grid);
    app.appendChild(section);
  }
}

function renderCard(item) {

  const isSold = item.Status === "sold";

  const imageHTML = item.Image
    ? `<img src="${item.Image}" />`
    : `<img class="placeholder" src="${iconMap[item.Type] || iconMap.wing}" />`;

  const tagClass = item.Tag?.includes("hot") ? "hot" :
                   item.Tag?.includes("new") ? "new" : "";

  return `
    <div class="card ${isSold ? "sold" : ""}">

      <div class="badge ${tagClass}">
        ${item.Tag || ""}
      </div>

      <div class="img">
        ${imageHTML}
      </div>

      <div>${item.Name}</div>
      <div>ID: ${item.ID}</div>
      <div class="price">${item.Price}</div>
      <div class="details">${item.Details || ""}</div>

    </div>
  `;
}

</script>

</body>
</html>
