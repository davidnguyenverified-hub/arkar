<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MU Item List</title>

<style>
body {
  background: transparent; /* QUAN TRỌNG khi dùng iframe */
  font-family: Inter, Arial;
  color: #222;
}

/* SECTION */
.section {
  margin: 30px 0;
}

.section h2 {
  font-size: 16px;
  font-weight: 600;
  border-left: 3px solid #00c2a8;
  padding-left: 8px;
  color: #222;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #e5e5e5;
}

/* HEADER */
th {
  text-align: left;
  padding: 10px;
  font-size: 12px;
  color: #666;
  background: #f5f5f5;
  font-weight: 500;
}

/* ROW */
td {
  padding: 10px;
  font-size: 13px;
}

tr {
  border-bottom: 1px solid #eee;
}

tr:hover {
  background: #f9f9f9;
}

/* STATUS */
.available {
  color: #00a67d;
  font-weight: 500;
}

.sold {
  color: #999;
  text-decoration: line-through;
}

/* IMAGE */
.img img {
  width: 24px;
  opacity: 0.7;
}

/* DETAILS */
.details {
  font-size: 12px;
  color: #666;
}

/* BADGE */
.badge {
  font-size: 10px;
  padding: 2px 6px;
  margin-left: 6px;
  border-radius: 6px;
  position: relative;
  top: -4px;
}

/* HOT */
.badge-hot {
  background: #fff3cd;
  color: #b7791f;
  border: 1px solid #ffeeba;
}

/* NEW */
.badge-new {
  background: #e6fffa;
  color: #0f766e;
  border: 1px solid #b2f5ea;
}
</style>

</head>

<body>

<div id="app"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQgQuqvQJuRPCw_zJfgdGn0awqWwTweuJS1k2TPg83XOHsACvQnVxKZeMETZErpxuLXDBJyxXjMkVRJ/pub?gid=0&single=true&output=csv";

const iconMap = {
  wing: "https://img.icons8.com/ios-filled/50/999999/wings.png",
  jewel: "https://img.icons8.com/ios-filled/50/999999/gem.png",
  staff: "https://img.icons8.com/ios-filled/50/999999/magic.png",
  shield: "https://img.icons8.com/ios-filled/50/999999/shield.png"
};

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const data = parseCSV(csv).map(normalize);
    render(data);
  });

function parseCSV(text) {
  const rows = text.split("\n");
  const headers = rows[0].split(",");

  return rows.slice(1).map(row => {
    const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = values[i]?.replace(/"/g, "");
    });
    return obj;
  });
}

function normalize(item) {
  return {
    ...item,
    Status: item.Status?.toLowerCase(),
    Type: item.Type?.toLowerCase(),
    Tag: item.Tag?.toLowerCase()
  };
}

function render(items) {

  const grouped = {};

  items.forEach(item => {
    if (!grouped[item.Type]) grouped[item.Type] = [];
    grouped[item.Type].push(item);
  });

  const app = document.getElementById("app");

  for (let type in grouped) {

    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `<h2>${type.toUpperCase()}</h2>`;

    const table = document.createElement("table");

    table.innerHTML = `
      <tr>
        <th></th>
        <th>ID</th>
        <th>Name</th>
        <th>Details</th>
        <th>Price</th>
        <th>Status</th>
      </tr>
    `;

    grouped[type].sort((a, b) => {
      if (a.Status === b.Status) return 0;
      return a.Status === "available" ? -1 : 1;
    });

    grouped[type].forEach(item => {

      const icon = item.Image
        ? `<img src="${item.Image}" />`
        : `<img src="${iconMap[item.Type] || iconMap.wing}" />`;

      const statusClass = item.Status === "sold" ? "sold" : "available";

      let tagHTML = "";
      if (item.Tag?.includes("hot")) {
        tagHTML = `<span class="badge badge-hot">HOT</span>`;
      } else if (item.Tag?.includes("new")) {
        tagHTML = `<span class="badge badge-new">NEW</span>`;
      }

      table.innerHTML += `
        <tr class="${statusClass}">
          <td class="img">${icon}</td>
          <td>${item.ID}</td>
          <td>${item.Name} ${tagHTML}</td>
          <td class="details">${item.Details || ""}</td>
          <td>${item.Price}</td>
          <td>${item.Status}</td>
        </tr>
      `;
    });

    section.appendChild(table);
    app.appendChild(section);
  }
}

</script>

</body>
</html>
