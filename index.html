<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MU Item List</title>

<style>
body {
  background: #0b0b0e;
  color: #fff;
  font-family: Arial;
}

/* SECTION */
.section {
  margin: 30px 0;
}

.section h2 {
  border-left: 4px solid #00ffcc;
  padding-left: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  text-align: left;
  font-size: 13px;
}

th {
  background: #1a1a1f;
  color: #00ffcc;
}

tr {
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

tr:hover {
  background: rgba(0,255,200,0.05);
}

/* STATUS */
.available {
  color: #00ffcc;
}

.sold {
  color: red;
  opacity: 0.6;
  text-decoration: line-through;
}

/* TAG */
.tag-hot {
  color: orange;
}

.tag-new {
  color: #00ffcc;
}

/* IMAGE */
.img {
  width: 40px;
}

.img img {
  width: 32px;
}

/* SMALL TEXT */
.details {
  font-size: 11px;
  opacity: 0.7;
}
</style>

</head>

<body>

<h1>📦 Items On Sale</h1>
<div id="app"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQgQuqvQJuRPCw_zJfgdGn0awqWwTweuJS1k2TPg83XOHsACvQnVxKZeMETZErpxuLXDBJyxXjMkVRJ/pub?gid=0&single=true&output=csv";

const iconMap = {
  wing: "https://img.icons8.com/ios-filled/50/ffffff/wings.png",
  jewel: "https://img.icons8.com/ios-filled/50/ffffff/gem.png",
  staff: "https://img.icons8.com/ios-filled/50/ffffff/magic.png",
  shield: "https://img.icons8.com/ios-filled/50/ffffff/shield.png"
};

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const data = parseCSV(csv).map(normalize);
    render(data);
  });

function parseCSV(text) {
  const rows = text.split("\n");
  const headers = rows[0].split(",");

  return rows.slice(1).map(row => {
    const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = values[i]?.replace(/"/g, "");
    });
    return obj;
  });
}

function normalize(item) {
  return {
    ...item,
    Status: item.Status?.toLowerCase(),
    Type: item.Type?.toLowerCase(),
    Tag: item.Tag?.toLowerCase()
  };
}

function render(items) {

  const grouped = {};

  items.forEach(item => {
    if (!grouped[item.Type]) grouped[item.Type] = [];
    grouped[item.Type].push(item);
  });

  const app = document.getElementById("app");

  for (let type in grouped) {

    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `<h2>${type.toUpperCase()}</h2>`;

    const table = document.createElement("table");

    table.innerHTML = `
      <tr>
        <th></th>
        <th>ID</th>
        <th>Name</th>
        <th>Details</th>
        <th>Price</th>
        <th>Status</th>
      </tr>
    `;

    // SORT
    grouped[type].sort((a, b) => {
      if (a.Status === b.Status) return 0;
      return a.Status === "available" ? -1 : 1;
    });

    grouped[type].forEach(item => {

      const icon = item.Image
        ? `<img src="${item.Image}" />`
        : `<img src="${iconMap[item.Type] || iconMap.wing}" />`;

      const statusClass = item.Status === "sold" ? "sold" : "available";

      const tagLabel = item.Tag?.includes("hot") ? `<span class="tag-hot">HOT</span>` :
                       item.Tag?.includes("new") ? `<span class="tag-new">NEW</span>` : "";

      table.innerHTML += `
        <tr class="${statusClass}">
          <td class="img">${icon}</td>
          <td>${item.ID}</td>
          <td>${item.Name} ${tagLabel}</td>
          <td class="details">${item.Details || ""}</td>
          <td>${item.Price}</td>
          <td>${item.Status}</td>
        </tr>
      `;
    });

    section.appendChild(table);
    app.appendChild(section);
  }
}

</script>

</body>
</html>
