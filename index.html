<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MU Taxi Shop</title>

<style>
body {
  background: #0b0b0e;
  color: #fff;
  font-family: Arial;
  padding: 20px;
}

/* SECTION */
.section {
  margin-bottom: 40px;
}

.section h2 {
  border-left: 4px solid #00ffcc;
  padding-left: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 10px;
  padding: 10px;
  position: relative;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 10px rgba(0,255,200,0.3);
}

/* IMAGE */
.img {
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.img img {
  max-height: 100%;
}

/* PLACEHOLDER */
.placeholder {
  opacity: 0.5;
}

/* TEXT */
.name {
  font-size: 13px;
  margin-top: 5px;
}

.price {
  color: #00ffcc;
  font-weight: bold;
}

/* SOLD */
.sold {
  opacity: 0.4;
  filter: grayscale(80%);
}

.sold::after {
  content: "SOLD";
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: red;
  font-size: 16px;
  font-weight: bold;
}

/* BADGE */
.badge {
  position: absolute;
  top: 5px;
  right: 5px;
  font-size: 11px;
}

.hot { color: orange; }
.new { color: #00ffcc; }

</style>
</head>

<body>

<h1>🛒 MU Taxi Shop</h1>

<div id="app"></div>

<script>

// 👉 DÁN LINK CSV Ở ĐÂY
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQgQuqvQJuRPCw_zJfgdGn0awqWwTweuJS1k2TPg83XOHsACvQnVxKZeMETZErpxuLXDBJyxXjMkVRJ/pub?gid=0&single=true&output=csv";

// icon fallback theo type
const iconMap = {
  wing: "https://img.icons8.com/ios-filled/50/ffffff/wings.png",
  weapon: "https://img.icons8.com/ios-filled/50/ffffff/sword.png",
  pentagram: "https://img.icons8.com/ios-filled/50/ffffff/magic.png"
};

// fetch CSV
fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const data = parseCSV(csv);
    render(data);
  });

// parse CSV
function parseCSV(text) {
  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows[0];

  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = row[i]);
    return obj;
  });
}

// render main
function render(items) {

  // GROUP BY TYPE
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.Type]) grouped[item.Type] = [];
    grouped[item.Type].push(item);
  });

  const app = document.getElementById("app");

  for (let type in grouped) {

    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `<h2>${type.toUpperCase()}</h2>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    // SORT: available -> sold
    grouped[type].sort((a, b) => {
      if (a.Status === b.Status) return 0;
      return a.Status === "available" ? -1 : 1;
    });

    grouped[type].forEach(item => {
      grid.innerHTML += renderCard(item);
    });

    section.appendChild(grid);
    app.appendChild(section);
  }
}

// render card
function renderCard(item) {

  const isSold = item.Status === "sold";

  const imageHTML = item.Image
    ? `<img src="${item.Image}" />`
    : `<img class="placeholder" src="${iconMap[item.Type] || iconMap.weapon}" />`;

  return `
    <div class="card ${isSold ? "sold" : ""}">
      
      <div class="badge ${item.Tag}">
        ${item.Tag || ""}
      </div>

      <div class="img">
        ${imageHTML}
      </div>

      <div class="name">${item.Name}</div>
      <div>ID: ${item.ID}</div>
      <div class="price">${item.Price}$</div>

    </div>
  `;
}

</script>

</body>
</html>
